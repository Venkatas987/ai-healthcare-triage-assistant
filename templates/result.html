<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Results - AI Healthcare Triage</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏥 Analysis Results</h1>
            <p>Your symptoms have been analyzed</p>
        </header>

        <div class="main-card">
            <div class="result-summary" id="resultSummary">
                <!-- Results will be loaded here via JavaScript -->
            </div>

            <div class="action-buttons">
                <a href="/" class="btn-secondary">
                    <span class="btn-icon">←</span> New Analysis
                </a>
                <button onclick="window.print()" class="btn-print">
                    <span class="btn-icon">🖨️</span> Print Results
                </button>
            </div>

            <div class="disclaimer">
                <strong>⚠️ Important Notice</strong>
                <p>This analysis is generated by an AI system and should not be considered as medical advice. 
                Always consult with a qualified healthcare provider for proper diagnosis and treatment.</p>
            </div>
        </div>
    </div>

    <script>
        // Load results from session storage
        const results = JSON.parse(sessionStorage.getItem('lastResults') || '{}');
        
        function displayResults() {
            const container = document.getElementById('resultSummary');
            
            if (!results.primary) {
                container.innerHTML = '<p class="error">No results to display</p>';
                return;
            }

            const primary = results.primary;
            
            container.innerHTML = `
                <h2>Primary Diagnosis</h2>
                <div class="result-card">
                    <h3>${primary.disease}</h3>
                    <p>Confidence: ${primary.confidence}%</p>
                    <p>Specialist: ${primary.specialist}</p>
                    <p>Severity: ${primary.severity}</p>
                </div>
            `;
        }

        displayResults();
    </script>
</body>
</html>
